spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:reuniondb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:reunion}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
stripe.success-url=${STRIPE_SUCCESS_URL:https://tumblinfamily.com/pay?payment=success}
stripe.cancel-url=${STRIPE_CANCEL_URL:https://tumblinfamily.com/pay?payment=cancelled}

google.client-id=${GOOGLE_CLIENT_ID:}
google.ios-client-id=${GOOGLE_IOS_CLIENT_ID:}
