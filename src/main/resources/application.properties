spring.application.name=family-reunion-rsvp
spring.datasource.url=jdbc:h2:mem:reuniondb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

google.client-id=${GOOGLE_CLIENT_ID:}
google.ios-client-id=${GOOGLE_IOS_CLIENT_ID:}

# Email (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:}
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Twilio SMS
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.from-number=${TWILIO_FROM_NUMBER:}

# App
app.base-url=${APP_BASE_URL:http://localhost:5173}

# Google Drive Gallery (optional — gallery disabled if not set)
google.drive.credentials-file=${GOOGLE_DRIVE_CREDENTIALS_FILE:}
google.drive.folder-id=${GOOGLE_DRIVE_FOLDER_ID:}
