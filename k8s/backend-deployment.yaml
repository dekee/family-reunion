apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: family-reunion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend
          image: ghcr.io/dekee/family-reunion-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: google-oauth-secret
                  key: GOOGLE_CLIENT_ID
            - name: INITIAL_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: google-oauth-secret
                  key: INITIAL_ADMIN_EMAIL
            - name: INITIAL_ADMIN_NAME
              valueFrom:
                secretKeyRef:
                  name: google-oauth-secret
                  key: INITIAL_ADMIN_NAME
            - name: GMAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: notification-secret
                  key: GMAIL_USERNAME
            - name: GMAIL_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notification-secret
                  key: GMAIL_APP_PASSWORD
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: notification-secret
                  key: TWILIO_ACCOUNT_SID
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: notification-secret
                  key: TWILIO_AUTH_TOKEN
            - name: TWILIO_FROM_NUMBER
              valueFrom:
                secretKeyRef:
                  name: notification-secret
                  key: TWILIO_FROM_NUMBER
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: stripe-secret
                  key: STRIPE_SECRET_KEY
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: stripe-secret
                  key: STRIPE_WEBHOOK_SECRET
            - name: APP_BASE_URL
              value: "https://tumblinfamily.com"
            - name: GOOGLE_DRIVE_CREDENTIALS_FILE
              value: "/etc/gallery/credentials.json"
            - name: GOOGLE_DRIVE_FOLDER_ID
              valueFrom:
                secretKeyRef:
                  name: gallery-secret
                  key: GOOGLE_DRIVE_FOLDER_ID
          volumeMounts:
            - name: gallery-credentials
              mountPath: /etc/gallery
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/rsvp/summary
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/rsvp/summary
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: gallery-credentials
          secret:
            secretName: gallery-secret
            items:
              - key: credentials.json
                path: credentials.json
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: family-reunion
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
